<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .header .badge {
      font-size: 10px;
      background: #dc2626;
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.connected {
      background: #052e16;
      border: 1px solid #166534;
      color: #4ade80;
    }
    .status.disconnected {
      background: #1c1917;
      border: 1px solid #44403c;
      color: #a8a29e;
    }
    .status .icon { font-size: 18px; margin-right: 8px; }
    .info {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .steps {
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
    }
    .steps ol {
      padding-left: 20px;
    }
    .steps li { margin-bottom: 4px; }
    .steps a { color: #60a5fa; text-decoration: none; }
    .steps a:hover { text-decoration: underline; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary {
      background: #dc2626;
      color: white;
    }
    .btn-primary:hover { background: #b91c1c; }
    .btn-secondary {
      background: #27272a;
      color: #e0e0e0;
      border: 1px solid #3f3f46;
    }
    .btn-secondary:hover { background: #3f3f46; }
    .token-preview {
      font-family: monospace;
      font-size: 11px;
      color: #666;
      word-break: break-all;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 eDART Polska</h1>
    <span class="badge">Autodarts</span>
  </div>
  
  <div id="status" class="status disconnected">
    <span class="icon">⏳</span> Sprawdzanie...
  </div>
  
  <div class="info" id="info"></div>
  
  <div class="steps" id="steps" style="display:none">
    <p><strong>Jak to działa:</strong></p>
    <ol>
      <li>Otwórz <a href="https://play.autodarts.io" target="_blank">play.autodarts.io</a> i zaloguj się</li>
      <li>Zagraj lub otwórz dowolny mecz w historii</li>
      <li>Token zostanie przechwycony automatycznie</li>
      <li>Wróć do <a href="https://ace-darts-arena.lovable.app/submit" target="_blank">eDART Polska</a> i kliknij "Pobierz"</li>
    </ol>
  </div>

  <button class="btn btn-primary" id="copyBtn" style="display:none">📋 Kopiuj token</button>
  <button class="btn btn-secondary" id="openAutodarts">🔗 Otwórz Autodarts</button>

  <script src="popup.js"></script>
</body>
</html>
