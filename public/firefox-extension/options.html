<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>eDART Polska — Ustawienia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 24px;
    }
    h1 { font-size: 18px; margin-bottom: 20px; color: #fff; }
    .setting {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid #1a1a1a;
    }
    .setting-label { font-size: 13px; max-width: 280px; }
    .setting-label small { display: block; color: #666; margin-top: 2px; font-size: 11px; }
    .toggle {
      position: relative; width: 40px; height: 22px;
      background: #333; border-radius: 11px; cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.active { background: #dc2626; }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(18px); }
    .saved {
      text-align: center; color: #4ade80; font-size: 12px;
      margin-top: 16px; opacity: 0; transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
    .footer { margin-top: 20px; text-align: center; }
    .footer a { color: #60a5fa; text-decoration: none; font-size: 12px; }
  </style>
</head>
<body>
  <h1>⚙️ Ustawienia eDART Polska</h1>

  <div id="settings"></div>
  <div class="saved" id="savedMsg">✅ Zapisano</div>

  <div class="footer">
    <a href="https://edartpolska.pl" target="_blank">edartpolska.pl</a>
  </div>

  <script src="config.js"></script>
  <script src="playerConfig.js"></script>
  <script src="options.js"></script>
</body>
</html>
