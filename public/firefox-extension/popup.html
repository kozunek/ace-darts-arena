<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0b;
      color: #e0e0e0;
      padding: 16px;
    }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .header img { width: 32px; height: 32px; border-radius: 8px; }
    .header h1 { font-size: 14px; font-weight: 700; color: #fff; }
    .header span { font-size: 11px; color: #888; }
    .status {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .status.connected { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .status.disconnected { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .icon { font-size: 16px; }
    #info { font-size: 12px; color: #999; margin-bottom: 12px; line-height: 1.5; }
    .token-preview {
      margin-top: 6px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
      color: #ccc;
      word-break: break-all;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    #copyBtn {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      display: none;
    }
    #copyBtn:hover { filter: brightness(1.1); }
    #openAutodarts {
      background: rgba(255,255,255,0.06);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #openAutodarts:hover { background: rgba(255,255,255,0.1); }
    #steps {
      display: none;
      margin-top: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
    }
    #steps h3 { font-size: 12px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    #steps ol { padding-left: 18px; }
    #steps li { font-size: 12px; color: #999; margin-bottom: 4px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="eDART">
    <div>
      <h1>eDART Polska</h1>
      <span>Autodarts Stats v1.4.0</span>
    </div>
  </div>

  <div id="status" class="status disconnected">
    <span class="icon">⏳</span> Sprawdzanie...
  </div>

  <div id="info"></div>

  <button id="copyBtn">📋 Kopiuj token</button>
  <button id="openAutodarts">🎯 Otwórz Autodarts</button>

  <div id="steps">
    <h3>Jak uzyskać token?</h3>
    <ol>
      <li>Kliknij "Otwórz Autodarts" poniżej</li>
      <li>Zaloguj się na swoje konto</li>
      <li>Token zostanie przechwycony automatycznie</li>
      <li>Wróć tutaj — status zmieni się na ✅</li>
    </ol>
  </div>

  <script src="popup.js"></script>
</body>
</html>
