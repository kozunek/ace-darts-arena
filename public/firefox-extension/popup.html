<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles/design-system.css">
  <link rel="stylesheet" href="styles/themes.css">
  <style>
    body { padding: var(--sp-lg); }
    .actions { display: flex; flex-direction: column; gap: var(--sp-xs); margin-top: var(--sp-md); }
  </style>
</head>
<body class="theme-dark">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>🎯 eDART Polska</h1>
      <span class="version">v2.1</span>
    </div>
    <a class="gear" id="openSettings" title="Ustawienia">⚙️</a>
  </div>

  <!-- Connection status -->
  <div id="status" class="status disconnected">
    <span>⏳</span> Sprawdzanie...
  </div>

  <!-- Last match -->
  <div id="lastMatchSection" class="section" style="display:none">
    <div class="section-title">Ostatni mecz</div>
    <div id="lastMatch" class="card"></div>
  </div>

  <!-- Match timeline -->
  <div id="timelineSection" class="section" style="display:none">
    <div class="section-title">Status zgłoszenia</div>
    <div id="matchTimeline" class="card">
      <div class="timeline">
        <div class="timeline-step" id="tl-finished">
          <span class="timeline-dot pending">●</span>
          <span class="timeline-label muted">Mecz zakończony</span>
        </div>
        <div class="timeline-step" id="tl-submitted">
          <span class="timeline-dot pending">●</span>
          <span class="timeline-label muted">Wynik zgłoszony</span>
        </div>
        <div class="timeline-step" id="tl-approved">
          <span class="timeline-dot pending">●</span>
          <span class="timeline-label muted">Zatwierdzony przez admina</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Stats summary -->
  <div id="statsSection" class="section" style="display:none">
    <div class="section-title">Twoje statystyki</div>
    <div class="stats-row">
      <div class="stat-box"><div class="value" id="totalMatches">0</div><div class="label">Mecze</div></div>
      <div class="stat-box"><div class="value" id="winRate">-</div><div class="label">Wygrane</div></div>
      <div class="stat-box"><div class="value" id="avgScore">-</div><div class="label">Śr. avg</div></div>
    </div>
  </div>

  <!-- Match history -->
  <div id="historySection" class="section">
    <div class="section-title">Ostatnie mecze ligowe</div>
    <div id="matchHistory"></div>
  </div>

  <!-- Autodarts ID -->
  <div id="autodartsId" class="info" style="display:none"></div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="copyBtn" style="display:none">📋 Kopiuj token</button>
    <a class="btn btn-secondary" href="https://edartpolska.pl/matches" target="_blank">📊 Otwórz eDART — Mecze</a>
    <button class="btn btn-secondary" id="openAutodarts">🔗 Otwórz Autodarts</button>
  </div>

  <script src="config.js"></script>
  <script src="playerConfig.js"></script>
  <script src="popup.js"></script>
</body>
</html>
